<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Overlay Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }
  body {
    margin: 0;
    background: #c7cddb;   /* backdrop shown around the phone view on wide screens */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: stretch;
  }

  /* ---- App: flexible below 440px, capped mobile-view above ---- */
  .screen {
    position: relative;
    width: 100%;
    max-width: 440px;          /* laptop: locked to a 440px mobile view */
    height: 100vh;
    height: 100dvh;            /* full device height, auto-adjusts */
    background: #000;          /* black area revealed when the app slides up */
    overflow: hidden;
  }

  /* the whole app UI (header + content + footer) slides up as ONE unit */
  .app-frame {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #eef1f8;
    z-index: 2;
  }
  /* app screen stays put — no slide */

  .app-header { flex: none; }
  .app-header img { display: block; width: 100%; }
  .app-content {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;   /* native momentum scroll */
  }
  .app-content .content-img { display: block; width: 100%; }
  .app-footer { flex: none; }
  .app-footer img { display: block; width: 100%; }


  /* ---- Overlay: dark vignette + central bloom ---- */
  .overlay {
    position: absolute;
    inset: 0;
    background: transparent;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.7s ease;
    z-index: 10;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .overlay.play { opacity: 1; visibility: visible; }

  /* dark backdrop (fades out in phase 2, while the icon keeps flying) */
  .overlay-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg,
                  rgba(0,0,0,0.62) 0%,
                  rgba(0,0,0,0.72) 22%,
                  rgba(0,0,0,0.80) 45%,
                  rgba(0,0,0,0.85) 62%,
                  rgba(0,0,0,0.90) 100%);
    transition: opacity 0.6s ease;
  }
  .screen.mode2 .overlay-bg { opacity: 0; }

  /* content block, sits 50px below center */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(50px);
    width: 100%;
  }

  /* icon on top, text below */
  .stage    { order: 1; }
  .ai-text  { order: 2; }

  /* ---- Heading (below the icon); messages cross-fade ---- */
  .ai-text {
    position: relative;
    text-align: center;
    padding: 0 20px;
    margin-top: 40px;
    width: 100%;
    opacity: 0;
    transform: translateY(12px);
  }
  .overlay.play .ai-text {
    animation: textIn 0.7s ease forwards;
    animation-delay: 1.5s;      /* appears after the icon lands */
  }
  .ai-text .msg {
    color: #fff;
    font-size: 25px;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }
  /* stack the two messages so they cross-fade in place */
  .ai-text .msg2 {
    position: absolute;
    left: 0; right: 0; top: 0;
    opacity: 0;
  }

  /* ---- Icon stage + static blue shadow glow ---- */
  .stage {
    position: relative;
    z-index: 2;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-shadow {
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(49,99,255,0.55) 0%, rgba(49,99,255,0.0) 70%);
    filter: blur(6px);
    opacity: 0;
    pointer-events: none;
  }
  .overlay.play .icon-shadow {
    animation: fadeIn 0.6s ease 1s forwards;
  }

  /* icon: rise from the very bottom of the screen */
  .ai-rise {
    opacity: 0;
    transform: translateY(460px) scale(0.4);
  }
  .overlay.play .ai-rise {
    animation: riseUp 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }
  .ai-spin {
    width: 70px;
    height: 70px;
  }
  .overlay.play .ai-spin {
    animation: spin 4s linear 1s infinite;   /* continuous rotation, faster */
  }
  .ai-spin svg { width: 70px; height: 70px; display: block; }

  /* ---- Phase 2: Shilpa Mode panel ---- */
  .panel {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 19%;
    z-index: 6;                 /* bottom sheet ABOVE the static app */
    padding: 26px 24px;         /* equal top & bottom spacing */
    display: flex;
    flex-direction: column;
    justify-content: space-between;  /* icon group near top, buttons near bottom */
    background: #000;           /* solid black sheet */
    transform: translateY(100%);     /* hidden below; slides up in phase 2 (JS-driven) */
  }
  .panel-main { }

  .panel-top { display: flex; align-items: center; gap: 14px; }
  .panel-icon { width: 40px; height: 40px; flex: none; opacity: 0; }
  .panel-icon svg {
    width: 40px; height: 40px; display: block;
    animation: spin 4s linear infinite;   /* keep rotating in the panel too */
  }
  .panel-head { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 0.5px; opacity: 0; }
  .panel-head .on { color: #2FE6A0; }
  .panel-desc { margin-top: 12px; font-size: 15px; color: rgba(255,255,255,0.72); line-height: 1.4; opacity: 0; }
  .panel-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 30px; opacity: 0; }
  .panel-actions .dismiss { font-size: 13px; letter-spacing: 1px; color: rgba(255,255,255,0.5); cursor: pointer; }
  .panel-actions .start { font-size: 14px; font-weight: 700; letter-spacing: 1px; color: #fff; cursor: pointer; }

  /* Phase 2 transitions */
  .screen.mode2 .overlay { pointer-events: none; }        /* stays visible so the flying icon shows */
  .screen.mode2 .ai-text,
  .screen.mode2 .icon-shadow { animation: fadeOut 0.5s ease forwards; }
  .screen.mode2 .panel-head { animation: fadeIn 0.6s ease 0.7s forwards; }
  .screen.mode2 .panel-desc { animation: fadeIn 0.6s ease 0.85s forwards; }
  .screen.mode2 .panel-actions { animation: fadeIn 0.6s ease 1s forwards; }

  /* ---- Keyframes ---- */
  @keyframes riseUp {
    0%   { opacity: 0; transform: translateY(460px) scale(0.4); }
    50%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes emergeUp {   /* text grows out from behind the icon */
    0%   { opacity: 0; transform: translateY(85px) scale(0.08); }
    35%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeIn {   /* simple fade, no movement */
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes fadeOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes textIn {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

  <script>
    window.addEventListener("load", function () {
      // Phase 1: intro overlay appears
      setTimeout(function () {
        document.getElementById("overlay").classList.add("play");
      }, 2000);

      // Text swap: "Skip the Wait..." -> "Don't wait for your POC..."
      setTimeout(function () {
        var m1 = document.querySelector(".msg1");
        var m2 = document.querySelector(".msg2");
        m1.style.transition = "opacity 0.45s ease";
        m2.style.transition = "opacity 0.45s ease";
        m1.style.opacity = "0";
        m2.style.opacity = "1";
      }, 4200);

      // Phase 2: the panel slides up from the bottom (app stays put)
      setTimeout(function () {
        document.getElementById("screen").classList.add("mode2");
        slidePanelUpAndFlyIcon();
      }, 6800);
    });

    // Panel slides up as a bottom sheet; the intro icon flies down into it.
    function slidePanelUpAndFlyIcon() {
      var flyIcon = document.querySelector(".ai-rise");     // spinning icon (z-10, stays on top)
      var stage   = document.querySelector(".stage");       // stable, non-rotating source box
      var target  = document.querySelector(".panel-icon");  // resting spot inside the sheet
      var panel   = document.getElementById("panel");
      if (!flyIcon || !stage || !target || !panel) return;

      // measure the panel icon's FINAL (settled) position while temporarily at rest
      panel.style.transition = "none";
      panel.style.transform = "translateY(0)";
      panel.getBoundingClientRect();
      var t = target.getBoundingClientRect();
      panel.style.transform = "translateY(100%)";   // back below screen
      panel.getBoundingClientRect();

      // slide the sheet up
      setTimeout(function () {
        panel.style.transition = "transform 0.6s cubic-bezier(0.22, 1, 0.36, 1)";
        panel.style.transform = "translateY(0)";
      }, 30);

      // pin the icon where the intro left it, cancelling the entrance animation
      flyIcon.style.animation = "none";
      flyIcon.style.opacity = "1";
      flyIcon.style.transformOrigin = "center center";
      flyIcon.style.transform = "translate(0px, 0px) scale(1)";
      flyIcon.getBoundingClientRect();

      var f = stage.getBoundingClientRect();
      var dx = (t.left + t.width / 2) - (f.left + f.width / 2);
      var dy = (t.top + t.height / 2) - (f.top + f.height / 2);
      var scale = 40 / 70;   // intro icon is 70px, panel icon is 40px

      flyIcon.style.transition = "transform 1.15s cubic-bezier(0.4, 0, 0.2, 1)";
      setTimeout(function () {
        flyIcon.style.transform =
          "translate(" + dx + "px, " + dy + "px) scale(" + scale + ")";
      }, 30);
    }
  </script>
