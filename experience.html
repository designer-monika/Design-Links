<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Overlay Screen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }
  body {
    margin: 0;
    background: #c7cddb;   /* backdrop shown around the phone view on wide screens */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;

    display: flex;
    justify-content: center;
    align-items: stretch;
  }

  /* ---- App: flexible below 440px, capped mobile-view above ---- */
  .screen {
    position: relative;
    width: 100%;
    max-width: 440px;          /* laptop: locked to a 440px mobile view */
    height: 100vh;
    height: 100dvh;            /* full device height, auto-adjusts */
    background: #000;          /* black area revealed when the app slides up */
    overflow: hidden;
  }

  /* the whole app UI (header + content + footer) slides up as ONE unit */
  .app-frame {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: #eef1f8;
    z-index: 2;
  }
  /* app screen stays put — no slide */

  .app-header { flex: none; }
  .app-header img { display: block; width: 100%; }
  .app-content {
    flex: 1 1 auto;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;   /* native momentum scroll */
  }
  .app-content .content-img { display: block; width: 100%; }
  .app-footer { flex: none; }
  .app-footer img { display: block; width: 100%; }


  /* ---- Overlay: dark vignette + central bloom ---- */
  .overlay {
    position: absolute;
    inset: 0;
    background: transparent;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.7s ease;
    z-index: 10;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .overlay.play { opacity: 1; visibility: visible; }

  /* dark backdrop (fades out in phase 2, while the icon keeps flying) */
  .overlay-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(179deg,
                  rgba(0, 0, 0, 0.00) 19.22%,
                  rgba(0, 0, 0, 0.80) 41.74%,
                  #000 68.23%);

    transition: opacity 0.6s ease;
  }
  /* dark backdrop stays in phase 2 (no slide-up panel) */

  /* content block, sits below center */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: translateY(150px);
    width: 100%;
  }

  /* icon on top, text below */
  .stage    { order: 1; }
  .ai-text  { order: 2; }

  /* ---- Heading (below the icon) ---- */
  .ai-text {
    position: relative;
    text-align: center;
    padding: 0 20px;
    margin-top: 28px;
    width: 100%;
    opacity: 0;
    transform: translateY(12px);
  }
  .overlay.play .ai-text {
    animation: textIn 0.7s ease forwards;
    animation-delay: 0.9s;      /* appears after the icon lands */
  }
  .ai-text .headline-sm {
    color: #fff;
    font-size: 24px;
    font-weight: 600;
    line-height: 120%;
  }
  .ai-text .headline-lg {
    color: #fff;
    font-size: 24px;
    font-weight: 600;
    line-height: 120%;
    margin-top: 4px;
  }

  /* ---- Promo pill below the heading (text reveals left -> right) ---- */
  .pill {
    order: 3;
    margin-top: 20px;
    padding: 8px 40px;
    background: linear-gradient(61deg, rgba(21, 40, 200, 0.10) 17.85%, rgba(135, 230, 237, 0.10) 106.27%), #080B16;
    border-radius: 42px;
    color: #87E6ED;
    font-size: 13px;
    font-weight: 400;
    line-height: 18px;
    text-align: center;
    box-shadow: 0 0 1px 0 #20C9FF inset,
                0 0.565px 1.694px 0 rgba(49, 99, 255, 0.21),
                0 3.387px 3.387px 0 rgba(49, 99, 255, 0.16),
                0 9.032px 7.339px 0 rgba(49, 99, 255, 0.11),
                0 29.919px 25.968px 0 rgba(49, 99, 255, 0.08),
                0 46.29px 45.161px 0 rgba(49, 99, 255, 0.05);
    opacity: 0;              /* hidden until revealed */
    transition: opacity 0.5s ease;
  }
  /* inner wrapper carries the left->right reveal mask so the pill's
     box-shadow is NEVER clipped by a mask (masks cut off outset shadows) */
  .pill-text { display: inline-block; }
  .pill b { color: #87E6ED; font-weight: 700; }
  .pill .brand { color: #87E6ED; font-weight: 500; }

  /* subtext below the pill */
  .subtext {
    order: 4;
    margin-top: 12px;
    color: #87E6ED;
    font-size: 12px;
    line-height: 16px;
    font-weight: 500;
    text-align: center;
    opacity: 0;              /* fades in after the pill */
    transition: opacity 0.6s ease;
  }
  .subtext.show { opacity: 1; }

  /* pill box + shadow simply fade in (no mask here, so shadow is preserved) */
  .pill.reveal { opacity: 1; }

  /* left -> right reveal runs on the TEXT only, via a soft-edged mask */
  .pill.reveal .pill-text {
    -webkit-mask-image: linear-gradient(90deg, #000 0%, #000 45%, rgba(0,0,0,0) 78%);
            mask-image: linear-gradient(90deg, #000 0%, #000 45%, rgba(0,0,0,0) 78%);
    -webkit-mask-size: 300% 100%;
            mask-size: 300% 100%;
    -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
    -webkit-mask-position: 0 0;   /* resting state = fully visible */
            mask-position: 0 0;
    animation: revealLR 1.1s ease forwards;
  }

  /* disappear text: letters dissolve one-by-one, right -> left (blur + fade) */
  .dt-char { display: inline-block; white-space: pre; }
  .dt-char.go { animation: dtDissolve .4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

  /* ---- Icon stage ---- */
  .stage {
    position: relative;
    z-index: 2;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* icon: rise from the very bottom of the screen */
  .ai-rise {
    position: relative;
    opacity: 0;
    transform: translateY(460px) scale(0.4);
  }
  .overlay.play .ai-rise {
    animation: riseUp 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* 70px window onto the icon; the shared SVG carries its own shadow */
  .ai-spin {
    position: relative;
    z-index: 1;
    width: 70px;
    height: 70px;
  }
  .overlay.play .ai-spin {
    animation: spin 4s linear 1s infinite;   /* continuous rotation, faster */
  }
  /* the icon graphic occupies the top-right of the shared 161x163 canvas;
     offset it so the 70px icon sits in the box and its shadow spills out */
  .ai-spin svg {
    position: absolute;
    width: 161px;
    height: 163px;
    left: -76.77px;
    top: -1.13px;
    display: block;
    overflow: visible;
  }

  /* ---- Phase 2: bottom CTA (text + icon + buttons over the SAME overlay) ---- */
  .cta {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 6;
    padding: 0 20px 50px;
    display: flex;
    flex-direction: column;
    pointer-events: none;       /* inert during phase 1 */
  }

  .cta-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 26px;
  }
  .cta-text {
    font-size: 24px;
    font-weight: 600;
    color: #fff;
    line-height: 32px;
    opacity: 0;                 /* fades in during phase 2 */
  }
  .cta-text span{ color:#87E6ED;}
  .cta-icon { width: 40px; height: 40px; flex: none; }   /* landing slot for the flying icon (shrunk) */

  .cta-buttons { display: flex; gap: 14px; opacity: 0; }  /* fades in during phase 2 */
  .cta-buttons .btn {
    padding: 12px 30px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 16px;
    font-family: inherit;
    border: none;
    cursor: pointer;
      font-weight: 500;
  }
  .cta-buttons .btn-dismiss {
    background: rgba(38,38,38,0.75);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.14);
  }
  .cta-buttons .btn-try {
    background: #fff;
    color: #000;
  
  }

  /* Phase 2 transitions */
  .screen.mode2 .overlay { pointer-events: none; }        /* stays visible so the flying icon shows */
  /* phase-1 content hides automatically; only the icon moves down */
  .screen.mode2 .ai-text,
  .screen.mode2 .pill,
  .screen.mode2 .subtext { animation: fadeOut 0.45s ease forwards; }
  .screen.mode2 .cta-buttons { pointer-events: auto; }
  .screen.mode2 .cta-text { animation: fadeIn 0.6s ease 0.7s forwards; }
  .screen.mode2 .cta-buttons { animation: fadeIn 0.6s ease 0.7s forwards; }

  /* ---- Keyframes ---- */
  @keyframes riseUp {
    0%   { opacity: 0; transform: translateY(460px) scale(0.4); }
    50%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes emergeUp {   /* text grows out from behind the icon */
    0%   { opacity: 0; transform: translateY(85px) scale(0.08); }
    35%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeIn {   /* simple fade, no movement */
    0%   { opacity: 0; }
    100% { opacity: 1; }
  }
  @keyframes fadeOut {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(0); }
  }
  @keyframes textIn {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes revealLR {
    from { -webkit-mask-position: 100% 0; mask-position: 100% 0; }
    to   { -webkit-mask-position: 0 0;    mask-position: 0 0; }
  }
  @keyframes dtDissolve {
    from { opacity: 1; filter: blur(0);   transform: translateX(0); }
    to   { opacity: 0; filter: blur(6px); transform: translateX(5px); }
  }
</style>
</head>

  <script>
    window.addEventListener("load", function () {
      // Phase 1: intro overlay appears — icon rises + spins, heading fades in
      setTimeout(function () {
        document.getElementById("overlay").classList.add("play");
      }, 1500);

      // Promo pill + subtext: reveal ONCE (left -> right) after the icon lands,
      // then stay put — they hide automatically when phase 2 begins.
      setTimeout(function () {
        var pill = document.getElementById("promoPill");
        if (pill) pill.classList.add("reveal");
        var sub = document.getElementById("promoSub");
        if (sub) sub.classList.add("show");
      }, 3400);   // ~1.9s after the overlay plays

      // Phase 2: same overlay stays; content hides, icon moves to the bottom,
      // CTA text + buttons fade in.
      setTimeout(function () {
        document.getElementById("screen").classList.add("mode2");
        flyIconToBottom();
      }, 6200);

      // Buttons
      var btnDismiss = document.getElementById("btnDismiss");
      if (btnDismiss) btnDismiss.addEventListener("click", function () {
        document.getElementById("overlay").classList.remove("play");
      });
    });

    // "disappear text": wrap each character in a span (keeping <b>, <br>,
    // .brand and word boundaries intact), then dissolve them one-by-one from
    // the right — each letter blurs + fades out.
    function disappearText(el, step) {
      step = step || 40;
      var charSpans = [];
      (function walk(parent) {
        [].slice.call(parent.childNodes).forEach(function (node) {
          if (node.nodeType === 3) {                       // text node
            var frag = document.createDocumentFragment();
            node.textContent.split(/(\s+)/).forEach(function (part) {
              if (part === "") return;
              if (/^\s+$/.test(part)) {                    // keep spaces as wrap points
                frag.appendChild(document.createTextNode(part));
                return;
              }
              var word = document.createElement("span");   // keep words unbroken
              word.style.display = "inline-block";
              word.style.whiteSpace = "nowrap";
              part.split("").forEach(function (ch) {
                var s = document.createElement("span");
                s.className = "dt-char";
                s.textContent = ch;
                word.appendChild(s);
                charSpans.push(s);
              });
              frag.appendChild(word);
            });
            parent.replaceChild(frag, node);
          } else if (node.nodeType === 1 && node.tagName !== "BR") {
            walk(node);                                    // recurse into <b>, .brand
          }
        });
      })(el);

      var n = charSpans.length;
      charSpans.forEach(function (s, i) {                  // rightmost/last char first
        setTimeout(function () { s.classList.add("go"); }, (n - 1 - i) * step);
      });
    }

    // Intro icon flies down to its resting slot in the bottom CTA.
    function flyIconToBottom() {
      var flyIcon = document.querySelector(".ai-rise");   // spinning icon (stays on top)
      var stage   = document.querySelector(".stage");     // stable, non-rotating source box
      var target  = document.querySelector(".cta-icon");  // resting spot in the bottom CTA
      if (!flyIcon || !stage || !target) return;

      // pin the icon where the intro left it, cancelling the entrance animation
      flyIcon.style.animation = "none";
      flyIcon.style.opacity = "1";
      flyIcon.style.transformOrigin = "center center";
      flyIcon.style.transform = "translate(0px, 0px) scale(1)";
      flyIcon.getBoundingClientRect();

      var t = target.getBoundingClientRect();
      var f = stage.getBoundingClientRect();
      var dx = (t.left + t.width / 2) - (f.left + f.width / 2);
      var dy = (t.top + t.height / 2) - (f.top + f.height / 2);
      var scale = 40 / 70;   // shrink the 70px intro icon down to 40px as it lands

      flyIcon.style.transition = "transform 1.0s cubic-bezier(0.4, 0, 0.2, 1)";
      setTimeout(function () {
        flyIcon.style.transform =
          "translate(" + dx + "px, " + dy + "px) scale(" + scale + ")";
      }, 30);
    }
  </script>
</body>
</html>
